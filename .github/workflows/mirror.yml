name: Mirror to GitLab & Codeberg

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 0'

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Mirror to GitLab
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
        run: |
          git remote add gitlab https://oauth2:${GITLAB_TOKEN}@gitlab.acreetionos.org/natalie/chromiumbb.git 2>/dev/null || true
          git push --mirror gitlab
      - name: Mirror to Codeberg
        env:
          CODEBERG_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
        run: |
          git remote add codeberg https://sprunglesontheberg:${CODEBERG_TOKEN}@codeberg.org/sprunglesontheberg/chromiumbb.git 2>/dev/null || true
          git push --mirror codeberg
